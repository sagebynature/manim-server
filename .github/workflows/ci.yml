name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: manimcommunity/manim:v0.20.1
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: python -m pip install --no-cache-dir uv

      - name: Run tests
        run: make test
