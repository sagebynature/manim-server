name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: manimcommunity/manim:v0.20.1
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Install make
        run: apt-get update && apt-get install -y make

      - name: Install uv
        run: python -m pip install --no-cache-dir uv

      - name: Install project test dependencies
        run: uv pip install --python /opt/venv/bin/python -e . --group dev

      - name: Run ruff
        run: /opt/venv/bin/ruff check app tests

      - name: Check formatting
        run: /opt/venv/bin/ruff format --check app tests

      - name: Run ty
        run: /opt/venv/bin/ty check --python /opt/venv/bin/python app tests

      - name: Run pytest
        run: /opt/venv/bin/pytest -q
