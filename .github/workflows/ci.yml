name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Manim build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev pkg-config libcairo2-dev libpango1.0-dev

      - name: Run typecheck, tests, and build
        run: make sync test
